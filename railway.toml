[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# FrankenPHP is the long-running process. EXPOSE 8080 is set in the Dockerfile,
# but Railway injects its own PORT — the Dockerfile's CMD resolves $PORT at
# runtime so the SERVER_NAME directive matches.
startCommand = "frankenphp php-server -r public/ -e SERVER_NAME=:${PORT:-8080}"

# Healthcheck: hit the /up endpoint that Laravel registers by default.
# 200 = healthy, otherwise Railway restarts the container.
healthcheckPath = "/up"
healthcheckTimeout = 30
healthcheckInterval = 30

# Restart on failure (most failures are transient DB connection issues).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
