[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migration + cache on every start. Idempotent (safe to re-run).
# Runs INSIDE the Railway container, where the private MySQL hostname
# mysql.railway.internal (or $DB_HOST) is resolvable. Local machines
# cannot reach the private network, so migrations must run in-container.
startCommand = "php artisan migrate --force --no-interaction && php artisan config:cache && php artisan route:cache && SERVER_NAME=:${PORT:-8080} exec frankenphp php-server -r public/"

# Healthcheck: hit the /up endpoint that Laravel registers by default.
# 200 = healthy, otherwise Railway restarts the container.
healthcheckPath = "/up"
healthcheckTimeout = 30
healthcheckInterval = 30

# Restart on failure (most failures are transient DB connection issues).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
